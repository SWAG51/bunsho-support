name: build-installers

# v1.0.0 のようなタグ push で Windows/Mac をビルドし、Releases に自動添付する
# （手動実行も可。手動時は Artifacts に出るだけで Release には添付しない）
on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            cmd: npm run dist:mac
            name: mac
          - os: windows-latest
            cmd: npm run dist:win
            name: windows
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 依存をインストール
        run: npm ci || npm install

      - name: インストーラをビルド
        # 署名は build/afterPack.js（@electron/osx-sign のアドホック署名）で行う。
        run: ${{ matrix.cmd }}

      - name: 署名を検証（macのみ）
        if: matrix.name == 'mac'
        run: |
          APP=$(find release/mac-arm64 -maxdepth 1 -name "*.app" | head -1)
          echo "APP=$APP"
          echo "=== codesign --verify（有効なら無出力でOK）==="
          codesign --verify --deep --strict --verbose=2 "$APP"; echo "verify exit=$?"
          echo "=== 付与された entitlements ==="
          codesign -d --entitlements :- "$APP" 2>/dev/null | tr -d '\0' | grep -iE "library-validation|allow-jit|unsigned-exec" || true
          echo "=== Team ID（ad-hocなら空）==="
          codesign -dvv "$APP" 2>&1 | grep -iE "TeamIdentifier|Signature|flags" || true

      - name: 成果物をアップロード（Actionsの保管庫）
        uses: actions/upload-artifact@v4
        with:
          name: installer-${{ matrix.name }}
          path: |
            release/*.exe
            release/*.dmg
            release/*.zip
          if-no-files-found: ignore

      - name: Releases に添付（タグ push のときだけ）
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*.exe
            release/*.dmg
            release/*.zip
          fail_on_unmatched_files: false
